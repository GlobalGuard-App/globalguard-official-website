<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta -->
    <title>GlobalGuard — AI-Powered Personal Safety App</title>
    <meta name="description" content="GlobalGuard is your AI-powered personal safety guardian. SOS protection, live security intelligence, cyber safety, and emergency help — anywhere in the world." />
    <meta name="keywords" content="AI safety app, emergency protection app, cyber safety platform, SOS security app, personal protection AI, GlobalGuard AI, personal safety guardian" />
    <meta name="author" content="GlobalGuard" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00d4ff" />
    <meta name="msapplication-TileColor" content="#060810" />
    <meta name="color-scheme" content="dark" />

    <!-- Canonical -->
    <link rel="canonical" href="https://globalguard.app/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="GlobalGuard" />
    <meta property="og:title" content="GlobalGuard — AI-Powered Personal Safety App" />
    <meta property="og:description" content="Your AI Safety Guardian, Anywhere in the World. Personal safety, SOS alerts, live security intelligence, and cyber safety in one AI-powered app." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://globalguard.app/" />
    <meta property="og:image" content="https://globalguard.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GlobalGuard — AI-Powered Personal Safety App" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GlobalGuardApp" />
    <meta name="twitter:creator" content="@GlobalGuardApp" />
    <meta name="twitter:title" content="GlobalGuard — AI-Powered Personal Safety App" />
    <meta name="twitter:description" content="Your AI Safety Guardian, Anywhere in the World." />
    <meta name="twitter:image" content="https://globalguard.app/og-image.png" />
    <meta name="twitter:image:alt" content="GlobalGuard App Screenshot" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GlobalGuard",
      "url": "https://globalguard.app",
      "logo": "https://globalguard.app/logo.png",
      "description": "AI-powered personal safety platform providing SOS protection, live security intelligence, cyber safety, and emergency help.",
      "sameAs": [
        "https://twitter.com/GlobalGuardApp",
        "https://github.com/globalguard",
        "https://linkedin.com/company/globalguard"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://globalguard.app/contact"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GlobalGuard",
      "applicationCategory": "SecurityApplication",
      "applicationSubCategory": "PersonalSafety",
      "description": "AI-powered personal safety app with SOS protection, live security intelligence, cyber safety tools, and emergency help — works in 195+ countries.",
      "operatingSystem": "iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier available. Premium plans from $9.99/month."
      },
      "featureList": [
        "AI Guardian threat detection",
        "One-tap SOS emergency alerts",
        "Live global security intelligence",
        "Cyber safety and VPN protection",
        "Nearby emergency services locator",
        "Zero-knowledge encrypted data vault",
        "Offline emergency mode"
      ],
      "screenshot": "https://globalguard.app/og-image.png",
      "url": "https://globalguard.app",
      "publisher": {
        "@type": "Organization",
        "name": "GlobalGuard"
      }
    }
    </script>

    <!-- Structured Data: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GlobalGuard",
      "url": "https://globalguard.app",
      "description": "AI-powered personal safety guardian for everyone, everywhere.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://globalguard.app/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
