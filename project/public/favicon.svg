<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="16" y1="3" x2="16" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="shield-stroke" x1="8" y1="3" x2="24" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Shield body -->
  <path d="M16 3.5L6 7.5V16c0 5.5 4.3 10.1 10 11.5C21.7 26.1 26 21.5 26 16V7.5L16 3.5Z"
        fill="url(#shield-fill)"
        stroke="url(#shield-stroke)"
        stroke-width="1.2"
        stroke-linejoin="round"
        filter="url(#glow)"/>

</svg>